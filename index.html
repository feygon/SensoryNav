<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SensoryNav</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 640px;
      margin: 80px auto;
      padding: 0 20px;
      line-height: 1.5;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 8px;
    }

    .soon {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 24px;
    }

    form {
      margin-top: 28px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    input {
      font-size: 16px;
      padding: 10px;
      min-width: 260px;
      border: 1px solid #999;
    }

    button {
      font-size: 16px;
      padding: 10px 16px;
      border: 1px solid #333;
      background: #eee;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>SensoryNav</h1>
  <div class="soon">Coming soon</div>
  <p>A calmer map for people who want smoother roads, quieter routes, and fewer sensory ambushes.</p>

  <form id="waitlist-form">
    <input type="email" name="email" placeholder="you@example.com" aria-label="Email address" required>
    <button type="submit">Join waitlist</button>
  </form>
  <p id="form-status" aria-live="polite"></p>

  <script>
    const SUPABASE_URL = "YOUR_SUPABASE_URL";
    const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";

    const form = document.getElementById("waitlist-form");
    const status = document.getElementById("form-status");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      status.textContent = "Sending...";

      const email = new FormData(form).get("email");

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/waitlist_signups`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
            "Prefer": "return=minimal"
          },
          body: JSON.stringify({
            email,
            tag: "waitlist"
          })
        });

        if (!response.ok) {
          throw new Error("Signup failed");
        }

        form.reset();
        status.textContent = "You're on the waitlist.";
      } catch (error) {
        status.textContent = "Something went wrong. Please try again.";
      }
    });
  </script>
</body>
</html>
