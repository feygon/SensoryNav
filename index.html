<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SensoryNav</title>
  <link rel="stylesheet" href="styles.css?v=0.0.7">
</head>
<body>
  <div id="build-version">v...</div>
  <h1>SensoryNav</h1>
  <div class="soon">Coming soon</div>
  <p id="mode-copy">A map with a calmer route for people who want smoother, quieter roads, and fewer sensory ambushes, like this nasty white webpage. Click <a href="#" id="dark-mode-link">here</a> for dark mode.</p>

  <form id="waitlist-form">
    <input type="email" name="email" placeholder="you@example.com" aria-label="Email address" required>
    <button type="submit">Join waitlist</button>
  </form>
  <p id="form-status" aria-live="polite"></p>

  <figure class="comic-preview">
    <img src="assets/sensorynav-comic.png?v=0.0.7" alt="Three-panel comic showing a driver overwhelmed by road noise, then relieved by a smooth new road surface.">
  </figure>

  <script src="app.js?v=0.0.7"></script>
</body>
</html>
