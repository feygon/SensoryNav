name: Deploy site to GitHub Pages

# Publishes the static web files from `main` to the `gh-pages` branch (the current
# Pages source) on every push to main. Deliberately uses ZERO marketplace actions —
# pure git + the built-in GITHUB_TOKEN — so there is no third-party action to vet
# (secure-installer) or pin to a SHA, and the workflow holds only the least privilege
# it needs. Dev/backend files (harness/, scripts/, tests/, docs/, supabase/) are NOT
# served — only the explicit web allowlist below is deployed.
#
# PREREQUISITE: this deploys whatever is on `main`. Make sure the site content you want
# live has been merged to main first, or the first run will publish main's older state.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # least privilege: only needs to push the gh-pages branch

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Publish web files to gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SRC_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          AUTH="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"

          # 1. Fetch the source at the pushed commit (no checkout action).
          git clone --quiet --depth 1 "$AUTH" src
          git -C src checkout --quiet "$SRC_SHA"

          # 2. Assemble the deployable web subset (explicit allowlist).
          rm -rf _site && mkdir _site
          for f in index.html capture.html analyze.html links.html tingles.html tingles-mufasa.html \
                   styles.css capture.css analyze.css pipeline.css timeline.css theme.js app.js capture.js analyze.js analyze-worker.js ribbon-render.js timeline-render.js pipeline.js capture-worklet.js \
                   build.json project-entry.json; do
            [ -f "src/$f" ] && cp -- "src/$f" _site/
          done
          if [ -d src/recorder ]; then mkdir -p _site/recorder && cp src/recorder/*.js _site/recorder/; fi
          # Analysis pipeline modules the analyze worker loads at runtime. Derived from the MODULES
          # array in analyze-worker.js so this allowlist can NEVER drift out of sync with the worker
          # (add a module there and it deploys automatically; nothing else under harness/ is served).
          # Paths are site-root-relative, matching the worker's fetch() calls.
          sed -n '/var MODULES = \[/,/];/p' src/analyze-worker.js \
            | grep -oE '"[^"]+\.js"' | tr -d '"' | while read -r m; do
                if [ ! -f "src/$m" ]; then echo "deploy: worker MODULE missing from source: $m" >&2; exit 1; fi
                mkdir -p "_site/$(dirname "$m")"
                cp -- "src/$m" "_site/$m"
              done
          # Event registry the worker reads for tag extraction (fetched by analyze.js).
          mkdir -p _site/harness/tags && cp src/harness/tags/registry.json _site/harness/tags/
          [ -d src/assets ] && cp -r src/assets _site/
          [ -d src/sample ] && cp -r src/sample _site/
          touch _site/.nojekyll # serve files as-is, no Jekyll processing

          # 3. Publish: gh-pages is a mirror of the assembled site (single deploy commit).
          cd _site
          git init --quiet -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit --quiet -m "Deploy ${SRC_SHA} from main"
          git push --quiet --force "$AUTH" gh-pages
